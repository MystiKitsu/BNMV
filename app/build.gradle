import org.jetbrains.kotlin.gradle.dsl.JvmTarget

plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.plugin.compose'
}

android {
    namespace 'com.better.nothing.music.vizualizer'
    compileSdk 35

    defaultConfig {
        applicationId "com.better.nothing.music.vizualizer"
        minSdk 34
        targetSdk 35
        versionCode 7
        versionName '3.1'
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            versionNameSuffix '.debug'
            applicationIdSuffix '.debug'
        }
    }

    buildFeatures {
        compose true
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlin {
        compilerOptions {
            jvmTarget.set(JvmTarget.JVM_17)
            // Change JVM_1_8 to JVM_11 or JVM_17 depending on your project needs
        }
    }
}

dependencies {
    // 1. Keep your local SDK
    implementation fileTree(dir: 'libs', include: ['*.aar', '*.jar'])

    // FFT Library for better accuracy
    implementation 'com.github.wendykierp:JTransforms:3.2'

    // 2. Compose BOM - Manages versions for all compose libs below
    implementation platform('androidx.compose:compose-bom:2024.12.01')

    // 3. Core Compose Libraries (Versions handled by BOM)
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-graphics'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.animation:animation'
    implementation 'androidx.compose.foundation:foundation-layout'
    implementation 'androidx.compose.runtime:runtime'
    implementation 'androidx.compose.animation:animation-core'

    // 4. Material 3
    implementation "androidx.compose.material3:material3"
    implementation 'com.google.android.material:material:1.12.0'

    // 5. Activity & Lifecycle
    implementation 'androidx.activity:activity-compose:1.9.3'

    // 6. Standard Icons only
    implementation 'androidx.compose.material:material-icons-extended'

    // 7. Legacy Support
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.benchmark:benchmark-traceprocessor:1.3.3'

    // 8. Debugging
    debugImplementation 'androidx.compose.ui:ui-tooling'
}
