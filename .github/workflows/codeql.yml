name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '01 0 * * *' # Runs every day at 00:01 UTC

jobs:
  analyze:
    name: Analyze (Kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # We only analyze java-kotlin for this Android project
        language: ['java-kotlin']
        # 'autobuild' attempts to build the project automatically.
        # For Gradle projects, this usually runs './gradlew build' without extra config.
        build-mode: autobuild
        # CodeQL supports the following values keywords for 'language': 'actions', 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'rust', 'swift'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # If you wish to specify custom queries, you can do so here or in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.
        # queries: security-extended,security-and-quality

    # If the analyze step fails with "We were unable to automatically build your code",
    # you may need to switch build-mode to 'manual' and uncomment the step below.
    # However, 'autobuild' usually works out-of-the-box for Gradle.
    
    # - name: Run manual build steps
    #   if: matrix.build-mode == 'manual'
    #   shell: bash
    #   run: |
    #     ./gradlew assembleDebug

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
